<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TalentFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling khusus Halaman Login agar presisi di tengah dan tidak bisa di-scroll */
    body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #070a13; margin: 0; overflow: hidden; }
    
    .login-header { text-align: center; margin-bottom: 30px; }
    .login-header h2 { font-family: 'Syne'; font-size: 24px; margin-top: 15px; color: #fff; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 13px; color: #8fa0be; margin-bottom: 8px; }
    
    /* Input transparan */
    .input-group input { 
      width: 100%; padding: 12px 16px; border-radius: 8px; 
      background: rgba(11, 15, 26, 0.6); 
      border: 1px solid rgba(255,255,255,0.15); 
      color: #e8edf5; font-family: 'DM Sans'; transition: 0.2s; 
    }
    .input-group input:focus { border-color: #f59e0b; outline: none; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
    .error-msg { color: #ef4444; font-size: 13px; margin-bottom: 15px; text-align: center; display: none; }

    /* =========================================
       TILTED CARD — perspective wrapper
       ========================================= */
    .card-wrapper {
      perspective: 800px;
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px; /* Disesuaikan dengan lebar form login sebelumnya */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Efek Kaca (Glassmorphism) yang sudah dimodifikasi untuk 3D */
    .login-box {
        background: rgba(17, 24, 39, 0.65) !important;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1) !important;
        padding: 40px; border-radius: 16px; width: 100%;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        /* 3D tilt engine hooks */
        transform-style: preserve-3d;
        will-change: transform;
        transition: box-shadow 0.3s ease;
    }

    /* Tooltip that follows cursor */
    .tilt-tooltip {
      pointer-events: none;
      position: fixed;
      background: #fff;
      color: #2d2d2d;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-family: 'DM Sans', sans-serif;
      opacity: 0;
      z-index: 999;
      transition: opacity 0.2s ease;
      transform: translateZ(0);
      white-space: nowrap;
    }

    /* =========================================
       GRADIENT MAGIC TEXT — TF BADGE
       ========================================= */
    .tf-badge {
      width: 56px; height: 56px; border-radius: 14px;
      display: inline-grid; place-items: center; margin: 0 auto;
      background: rgba(255,255,255,0.06);
      position: relative;
      animation: tfGlow 8s ease-in-out infinite alternate;
    }
    .tf-badge::before {
      content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1.5px;
      background: linear-gradient(to right, #f59e0b, #fde68a, #ffffff, #fde68a, #f59e0b);
      background-size: 300% 100%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      animation: gradientShift 8s ease-in-out infinite alternate;
    }
    .tf-text {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px;
      background-image: linear-gradient(to right, #f59e0b, #fde68a, #ffffff, #fde68a, #f59e0b);
      background-size: 300% 100%;
      background-clip: text; -webkit-background-clip: text; color: transparent;
      animation: gradientShift 8s ease-in-out infinite alternate;
    }
    @keyframes gradientShift {
      0%   { background-position: 0%   50%; }
      100% { background-position: 100% 50%; }
    }
    @keyframes tfGlow {
      0%   { box-shadow: 0 0 18px rgba(245,158,11,0.35); }
      50%  { box-shadow: 0 0 28px rgba(253,230,138,0.45); }
      100% { box-shadow: 0 0 18px rgba(255,255,255,0.25); }
    }
  </style>
</head>
<body>

  <canvas id="galaxyCanvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #070a13;"></canvas>

  <div class="tilt-tooltip" id="tiltTooltip">TalentFlow Login</div>

  <figure class="card-wrapper" id="cardWrapper">
    <div class="login-box" id="loginBox">
      <div class="login-header">
        <div class="tf-badge"><span class="tf-text">TF</span></div>
        <h2>Masuk ke TalentFlow</h2>
      </div>

      <form id="loginForm">
        <div class="error-msg" id="errorMsg">Email atau password salah.</div>
        
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="budi@talentflow.com" required>
        </div>
        
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="passwordInput" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%; margin-top: 10px; padding: 12px; font-weight: bold; background: #f59e0b; color: #000; border: none; border-radius: 8px; cursor: pointer;">Masuk Sekarang</button>
        
        <p style="text-align: center; margin-top: 20px; font-size: 13px; color: #8fa0be;">
          Belum punya akun? <a href="register.html" style="color: #f59e0b; text-decoration: none; font-weight: bold;">Daftar di sini</a>
        </p>
      </form>

      <div id="tiltGlare" style="position:absolute; inset:0; border-radius:16px; pointer-events:none; z-index:20; transition: background 0.1s;"></div>
    </div>
  </figure>

  <script>
    const canvas = document.getElementById('galaxyCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];
    let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;

    function initGalaxy() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      stars = [];
      for(let i=0; i<450; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          z: Math.random() * 2 + 0.1, 
          r: Math.random() * 1.5 + 0.5, 
          color: `hsl(${220 + Math.random()*40}, 80%, ${70 + Math.random()*30}%)` 
        });
      }
    }

    window.addEventListener('resize', initGalaxy);
    window.addEventListener('mousemove', (e) => {
      targetX = (e.clientX - width / 2) * 0.05; 
      targetY = (e.clientY - height / 2) * 0.05;
    });

    function animateGalaxy() {
      ctx.fillStyle = 'rgba(7, 10, 19, 0.3)';
      ctx.fillRect(0, 0, width, height);
      mouseX += (targetX - mouseX) * 0.1;
      mouseY += (targetY - mouseY) * 0.1;

      stars.forEach(s => {
        s.y -= (s.z * 0.5); 
        s.x -= (mouseX * s.z * 0.05);
        s.y -= (mouseY * s.z * 0.05);

        if(s.y < 0) s.y = height;
        if(s.y > height) s.y = 0;
        if(s.x < 0) s.x = width;
        if(s.x > width) s.x = 0;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.fill();
      });
      requestAnimationFrame(animateGalaxy);
    }

    initGalaxy();
    animateGalaxy();
  </script>

  <script>
    (function () {
      const card    = document.querySelector('.login-box');
      const glare   = document.getElementById('tiltGlare');
      const tooltip = document.getElementById('tiltTooltip');

      const DAMPING    = 30;
      const STIFFNESS  = 100;
      const MASS       = 2;
      const AMPLITUDE  = 12;    
      const SCALE_MAX  = 1.05;  

      const state = {
        rotX:  { cur: 0, vel: 0, target: 0 },
        rotY:  { cur: 0, vel: 0, target: 0 },
        scale: { cur: 1, vel: 0, target: 1 }
      };

      let rafId  = null;
      let active = false;
      let lastTs = null;

      function springStep(s, dt) {
        const dt_s = Math.min(dt, 64) / 1000;
        const acc  = ((s.target - s.cur) * STIFFNESS - s.vel * DAMPING) / MASS;
        s.vel += acc * dt_s;
        s.cur += s.vel * dt_s;
      }

      function loop(ts) {
        const dt = lastTs ? ts - lastTs : 16;
        lastTs = ts;

        springStep(state.rotX,  dt);
        springStep(state.rotY,  dt);
        springStep(state.scale, dt);

        card.style.transform =
          `rotateX(${state.rotX.cur.toFixed(3)}deg) ` +
          `rotateY(${state.rotY.cur.toFixed(3)}deg) ` +
          `scale(${state.scale.cur.toFixed(4)})`;

        const settled =
          Math.abs(state.rotX.vel)  < 0.01  && Math.abs(state.rotX.cur  - state.rotX.target)  < 0.01 &&
          Math.abs(state.rotY.vel)  < 0.01  && Math.abs(state.rotY.cur  - state.rotY.target)  < 0.01 &&
          Math.abs(state.scale.vel) < 0.001 && Math.abs(state.scale.cur - state.scale.target) < 0.001;

        if (!settled || active) {
          rafId = requestAnimationFrame(loop);
        } else {
          rafId = null; lastTs = null;
        }
      }

      function startLoop() {
        if (!rafId) rafId = requestAnimationFrame(loop);
      }

      card.addEventListener('mouseenter', () => {
        active = true;
        state.scale.target = SCALE_MAX;
        tooltip.style.opacity = '1';
        startLoop();
      });

      card.addEventListener('mousemove', (e) => {
        const rect    = card.getBoundingClientRect();
        const offsetX = e.clientX - rect.left  - rect.width  / 2;
        const offsetY = e.clientY - rect.top   - rect.height / 2;

        state.rotX.target = (offsetY / (rect.height / 2)) * -AMPLITUDE;
        state.rotY.target = (offsetX / (rect.width  / 2)) * AMPLITUDE;

        const pctX = ((e.clientX - rect.left)  / rect.width  * 100).toFixed(1);
        const pctY = ((e.clientY - rect.top)   / rect.height * 100).toFixed(1);
        glare.style.background =
          `radial-gradient(circle at ${pctX}% ${pctY}%, ` +
          `rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 40%, transparent 70%)`;

        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY + 14) + 'px';

        startLoop();
      });

      card.addEventListener('mouseleave', () => {
        active = false;
        state.rotX.target  = 0;
        state.rotY.target  = 0;
        state.scale.target = 1;
        glare.style.background = 'none';
        tooltip.style.opacity  = '0';
        startLoop();
      });
    })();
  </script>

  <script src="script.js"></script>
</body>
</html>
