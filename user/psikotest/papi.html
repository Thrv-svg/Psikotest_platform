<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAPI Kostick Assessment — TalentFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../kuis/kuis.css"> <style>
    /* Styling Khusus untuk Tombol A/B PAPI Kostick */
    .papi-option {
        display: flex; align-items: center; gap: 15px; padding: 20px; 
        border: 2px solid #1f2d45; border-radius: 12px; background: #111827; 
        cursor: pointer; transition: all 0.2s; margin-bottom: 15px;
    }
    .papi-option:hover { border-color: #3b82f6; }
    .papi-option.selected { 
        border-color: #10b981; background: rgba(16,185,129,0.1); 
    }
    .papi-badge {
        width: 35px; height: 35px; border-radius: 8px; background: #1f2d45; 
        color: #8fa0be; display: grid; place-items: center; font-weight: bold; flex-shrink: 0;
    }
    .papi-option.selected .papi-badge {
        background: #10b981; color: #ffffff;
    }
    .papi-text { color: #e8edf5; font-size: 16px; line-height: 1.5; }
    
    /* Grid Navigasi Khusus 90 Soal (Lebih padat & bisa di-scroll) */
    .nav-grid-90 {
        display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; 
        max-height: 350px; overflow-y: auto; padding-right: 5px;
    }
    .nav-grid-90::-webkit-scrollbar { width: 5px; }
    .nav-grid-90::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 5px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="kuis-title">
      <h2>PAPI Kostick Test</h2>
      <p id="teksSoalKuis">Soal 0 dari 90</p>
    </div>
    <div class="timer-badge">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="teksTimer">45:00</span>
    </div>
  </div>

  <div class="main-container">
    <div class="question-area" id="areaPertanyaan" style="display: none;">
      <div class="q-header">
        <div class="q-number" id="labelNomorSoal">Pertanyaan 1</div>
        <div class="q-poin" style="background: rgba(59,130,246,0.15); color: #3b82f6;">Pilih Satu Paling Sesuai</div>
      </div>
      
      <p style="color: var(--muted); margin-bottom: 25px;">Manakah dari dua pernyataan di bawah ini yang paling menggambarkan diri Anda di lingkungan kerja?</p>
      
      <div id="opsiContainer" style="margin-bottom: 30px;">
        </div>

      <div class="bottom-actions">
        <button class="btn btn-outline" id="btnPrev">← Sebelumnya</button>
        <button class="btn btn-primary" id="btnNext">Selanjutnya →</button>
      </div>
      <button class="btn btn-primary" id="btnSubmit" style="width: 100%; margin-top: 15px; display: none; background: #10b981; color: white;">Selesai & Kumpulkan</button>
    </div>

    <div class="nav-area">
      <h3 style="margin: 0 0 10px 0; font-size: 16px;">Navigasi Soal</h3>
      <div class="nav-grid-90" id="gridNavigasi"></div>
      <div style="margin-top: 20px; font-size: 13px; color: #8fa0be;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;"><span style="display:block; width:12px; height:12px; background:#10b981; border-radius:3px;"></span> Sudah Dijawab</div>
        <div style="display:flex; align-items:center; gap:8px;"><span style="display:block; width:12px; height:12px; background:transparent; border:1px solid #1f2d45; border-radius:3px;"></span> Belum Dijawab</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="customModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: #111827; border: 1px solid #1f2d45; border-radius: 12px; padding: 30px; max-width: 400px; text-align: center; width: 90%;">
      <div id="modalIcon" style="margin: 0 auto 15px; width: 60px; height: 60px; border-radius: 50%; display: grid; place-items: center;"></div>
      <h3 id="modalTitle" style="font-family: 'Syne'; margin-bottom: 10px; color: #fff; font-size: 20px;">Info</h3>
      <p id="modalMessage" style="color: #8fa0be; font-size: 14px; margin-bottom: 25px; line-height: 1.5;"></p>
      <button id="btnModalOk" class="btn btn-primary" style="width: 100%;">OK</button>
    </div>
  </div>

  <script src="papi.js"></script>
</body>
</html>
