<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tes Kraepelin — TalentFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* RESET BORDER BOX AGAR PADDING TIDAK MERUSAK LEBAR */
    * { box-sizing: border-box; }

    /* PERBAIKAN RESPONSIVITAS HP: Menggunakan 100dvh & Flex-Direction Column */
    body { 
      background: #070a13; color: #e8edf5; font-family: 'DM Sans', sans-serif; 
      margin: 0; padding: 15px; 
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      height: 100dvh; /* Menggunakan Dynamic Viewport agar akurat di HP */
      overflow: hidden; /* Kunci mati agar web tidak bisa discroll sama sekali */
    }
    
    .header-test { text-align: center; width: 100%; flex-shrink: 0; }
    .header-test h2 { font-family: 'Syne'; margin: 0 0 10px 0; }
    .timer-box { font-size: 24px; font-weight: bold; color: #f59e0b; background: rgba(245,158,11,0.1); padding: 8px 20px; border-radius: 8px; border: 1px solid rgba(245,158,11,0.2); display: inline-block; }
    .instruction-text { color: #8fa0be; font-size: 14px; margin-top: 10px; margin-bottom: 10px; }
    
    /* PERBAIKAN BOARD: Menggunakan Flex: 1 agar ukurannya otomatis mengisi ruang kosong tanpa mendesak Numpad */
    #kraepelin-board {
      background: #111827; border: 1px solid #1f2d45; border-radius: 12px; padding: 15px;
      width: 100%; max-width: 900px;
      flex: 1; /* KUNCI UTAMA RESPONSIVITAS */
      min-height: 150px; 
      overflow: hidden;
      display: flex; justify-content: center;
    }

    #board-inner {
      display: flex; gap: 15px; width: 100%; height: 100%;
      overflow: hidden; 
      align-items: flex-end; 
      position: relative;
    }
    
    .col-angka { 
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
      opacity: 0.3; width: 40px;
      transition: transform 0.2s ease-out, opacity 0.3s; 
    }
    .col-angka.active { opacity: 1; }
    
    .cell-angka { 
      font-size: 22px; font-weight: bold; height: 46px; width: 100%;
      display: flex; align-items: center; justify-content: center; position: relative; z-index: 2;
    }
    
    #focus-area {
      position: absolute; bottom: 0; width: 40px; height: 92px;
      background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px;
      transition: left 0.3s ease; z-index: 1; display: none;
    }
    #focus-cursor {
      position: absolute; bottom: 29px; width: 40px; height: 34px;
      background: rgba(59,130,246,0.3); border: 2px solid #3b82f6; border-radius: 6px;
      transition: left 0.3s ease; z-index: 10; display: none; pointer-events: none;
    }

    #hidden-input { position: absolute; opacity: 0; pointer-events: none; }
    
    /* PERBAIKAN NUMPAD: Mencegah Numpad terpotong di bawah */
    #start-screen { flex-shrink: 0; margin-bottom: 20px; }
    #numpad { 
      display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; 
      width: 100%; max-width: 300px; 
      flex-shrink: 0; margin-top: 10px; margin-bottom: 10px;
      padding-bottom: env(safe-area-inset-bottom, 10px); /* Untuk poni iPhone / Navigation Bar */
    }

    .num-btn { background: #1f2d45; color: #fff; border: 1px solid #3b82f6; border-radius: 8px; font-size: 24px; font-weight: bold; padding: 15px; cursor: pointer; transition: 0.1s; touch-action: manipulation; }
    .num-btn:active { background: #3b82f6; transform: scale(0.95); }
    .btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s;}
    .btn:hover { background: #2563eb; }
    .flash-pindah { animation: flashRed 0.5s ease-out; }
    @keyframes flashRed { 0% { background-color: rgba(239,68,68,0.4); } 100% { background-color: transparent; } }

    /* MEDIA QUERY: MENGECILKAN ELEMEN JIKA LAYAR HP KECIL/PENDEK */
    @media (max-width: 480px), (max-height: 700px) {
      .header-test h2 { font-size: 18px; margin-bottom: 5px; }
      .timer-box { font-size: 18px; padding: 5px 15px; }
      .instruction-text { font-size: 12px; margin-top: 5px; margin-bottom: 5px; }
      .num-btn { padding: 10px; font-size: 20px; }
      #numpad { gap: 8px; margin-top: 5px; }
      #kraepelin-board { padding: 10px; }
    }

    /* MEDIA QUERY EKSTREM: Layar sangat pendek (Landscape / HP jadul) */
    @media (max-height: 600px) {
      .instruction-text { display: none; } /* Sembunyikan instruksi demi hemat tempat */
      .num-btn { padding: 5px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="header-test">
    <h2>Tes Ketahanan Kerja (Kraepelin)</h2>
    <div class="timer-box" id="timerDisplay">Waktu Interval: 15s</div>
    <p class="instruction-text">Jumlahkan dua angka terbawah. Ketik digit terakhir dari hasilnya.</p>
  </div>

  <div id="kraepelin-board">
    <div id="board-inner">
      <div id="focus-area"></div>
      <div id="focus-cursor"></div>
    </div>
  </div>

  <input type="number" id="hidden-input" inputmode="numeric">
  
  <div id="start-screen">
    <button class="btn" id="btnMulai">Mulai Tes Sekarang</button>
  </div>

  <div id="numpad">
    <button class="num-btn">1</button><button class="num-btn">2</button><button class="num-btn">3</button>
    <button class="num-btn">4</button><button class="num-btn">5</button><button class="num-btn">6</button>
    <button class="num-btn">7</button><button class="num-btn">8</button><button class="num-btn">9</button>
    <div style="grid-column: 1"></div>
    <button class="num-btn">0</button>
  </div>

  <div id="transitionModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; flex-direction: column;">
    <div style="width: 80px; height: 80px; border-radius: 50%; background: rgba(239,68,68,0.2); color: #ef4444; display: grid; place-items: center; margin-bottom: 20px;">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="40" height="40"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <h2 style="color: #ef4444; font-family: 'Syne'; font-size: 32px; margin: 0 0 10px 0;">Waktu Habis!</h2>
    <p style="color: #fff; font-size: 18px; margin: 0; text-align: center;">Pindah ke baris selanjutnya dalam <br><span id="transitionCountdown" style="font-weight: bold; color: #f59e0b; font-size: 30px; display: block; margin-top: 10px;">5</span></p>
    <p style="color: var(--muted); font-size: 13px; margin-top: 15px; font-style: italic;">(Layar dikunci untuk mencegah kecurangan)</p>
  </div>

  <div class="modal-overlay" id="customModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
    <div style="background: #111827; border: 1px solid #1f2d45; border-radius: 12px; padding: 30px; max-width: 400px; text-align: center; width: 90%;">
      <div id="modalIcon" style="margin: 0 auto 15px; width: 60px; height: 60px; border-radius: 50%; display: grid; place-items: center;"></div>
      <h3 id="modalTitle" style="font-family: 'Syne'; margin-bottom: 10px; color: #fff; font-size: 20px;">Pemberitahuan</h3>
      <p id="modalMessage" style="color: #8fa0be; font-size: 14px; margin-bottom: 25px; line-height: 1.5;"></p>
      <button id="btnModalOk" class="btn" style="width: 100%; margin: 0;">OK, Mengerti</button>
    </div>
  </div>

  <script src="kraepelin.js"></script>
</body>
</html>
